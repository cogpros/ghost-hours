# closing-time sweep whitelist — EXAMPLE ENTRIES. Replace with your own repos.
# Format: one entry per line
#   REPO_PATH | STAGE_GLOB_1 STAGE_GLOB_2 ... | RUN_GITNEXUS (true|false)
#
# Rules:
# - Untracked files matching STAGE_GLOBs get staged + committed.
# - Already-committed but unpushed work is reported as pending-push; the push
#   itself waits for operator approval at the seal phase.
# - Modified tracked files are NEVER auto-staged. Those stay for manual review.
# - Wildcards are bash-style; paths are relative to REPO_PATH.
# - RUN_GITNEXUS=true refreshes a gitnexus code index after a commit (optional;
#   set false if you don't use one).
#
# Examples (commented out — uncomment and edit for your machine):
#~/notes          | daily/** journal/** | false
#~/my-skills      | */SKILL.md */scripts/** | false
#~/my-project     | docs/**.md | true
